<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحريري ✨ | متجر كوبات فاخرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-dark: #B8942F;
            --dark-gold: #8B6914;
            --black: #1A1A1A;
            --cream: #F8F4E6;
            --white: #FFFFFF;
            --shadow: 0 20px 40px rgba(0,0,0,0.15);
            --shadow-hover: 0 25px 50px rgba(212,175,55,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, var(--cream) 0%, #EDE4D4 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(212,175,55,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(212,175,55,0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(212,175,55,0.05) 0%, transparent 50%);
            z-index: -1; animation: float 20s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(1deg); } }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--black) 0%, #2D2D2D 100%);
            color: var(--white);
            padding: 1rem 2rem;
            position: sticky; top: 0; z-index: 100;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }
        .header-content {
            max-width: 1200px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 1rem;
        }
        .logo {
            font-family: 'Tajawal', sans-serif;
            font-size: 2.2rem; font-weight: 900;
            background: linear-gradient(45deg, var(--gold), #FFD700);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .status-tag {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            padding: 0.5rem 1.2rem; border-radius: 50px;
            font-size: 0.9rem; font-weight: 600;
            box-shadow: 0 5px 15px rgba(212,175,55,0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { box-shadow: 0 5px 15px rgba(212,175,55,0.4); } 50% { box-shadow: 0 5px 25px rgba(212,175,55,0.6); } }

        /* Container */
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }

        /* Auth Screen */
        #auth-screen {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--black) 0%, #2D2D2D 50%, var(--cream) 100%);
            position: relative; overflow: hidden;
        }
        .auth-box {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 3rem 2.5rem;
            border-radius: 25px;
            width: 100%; max-width: 420px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative; z-index: 2;
        }
        .auth-box::before {
            content: '';
            position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--gold), var(--gold-dark), var(--gold), #FFD700);
            border-radius: 27px; z-index: -1;
            animation: borderRotate 3s linear infinite;
        }
        @keyframes borderRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .auth-title {
            font-size: 2.5rem; font-weight: 900; margin-bottom: 1.5rem;
            background: linear-gradient(45deg, var(--black), var(--gold-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .input-group {
            position: relative; margin-bottom: 1.5rem;
        }
        .input-group input {
            width: 100%; padding: 1rem 1.2rem 1rem 3rem;
            border: 2px solid #E5E5E5; border-radius: 15px;
            font-size: 1rem; font-family: 'Cairo';
            background: rgba(255,255,255,0.8);
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            outline: none; border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212,175,55,0.1);
            transform: translateY(-2px);
        }
        .input-icon {
            position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            color: #888; font-size: 1.1rem;
        }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black); border: none;
            padding: 1.2rem 2rem; width: 100%;
            border-radius: 15px; cursor: pointer;
            font-weight: 700; font-size: 1.1rem;
            font-family: 'Cairo'; letter-spacing: 1px;
            transition: all 0.3s ease; position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(212,175,55,0.4);
        }
        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212,175,55,0.6);
        }
        .btn-gold:active { transform: translateY(-1px); }
        .toggle-link {
            margin-top: 1.5rem; font-size: 0.95rem;
            color: var(--gold-dark); cursor: pointer;
            font-weight: 600; transition: color 0.3s ease;
        }
        .toggle-link:hover { color: var(--gold); }

        /* Admin Panel */
        .admin-panel {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(248,244,230,0.9));
            backdrop-filter: blur(15px);
            padding: 2.5rem; border-radius: 20px;
            border: 2px solid rgba(212,175,55,0.2);
            margin-bottom: 3rem; box-shadow: var(--shadow);
            display: none;
        }
        .admin-title {
            font-size: 1.8rem; font-weight: 700; margin-bottom: 2rem;
            background: linear-gradient(45deg, var(--gold), var(--black));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2.5rem; margin-bottom: 3rem;
        }
        .product-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px; padding: 2rem 1.5rem;
            text-align: center; box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .product-card::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.1), transparent);
            transition: left 0.5s;
        }
        .product-card:hover::before { left: 100%; }
        .product-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: var(--shadow-hover);
        }
        .product-img {
            width: 100%; height: 220px; object-fit: cover;
            border-radius: 20px; margin-bottom: 1.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: transform 0.4s ease;
        }
        .product-card:hover .product-img { transform: scale(1.05); }
        .product-name {
            font-size: 1.4rem; font-weight: 700; margin-bottom: 0.8rem;
            color: var(--black);
        }
        .price-tag {
            font-size: 1.8rem; font-weight: 900; margin: 1rem 0 1.5rem;
            background: linear-gradient(45deg, var(--gold), var(--gold-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .btn-add {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black); border: none;
            padding: 1rem 2rem; border-radius: 50px;
            font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(212,175,55,0.4);
            width: 100%;
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(212,175,55,0.6);
        }

        /* Admin Buttons */
        .admin-btns {
            margin-top: 1rem; display: flex; gap: 0.8rem;
            justify-content: center; flex-wrap: wrap;
        }
        .btn-edit { 
            background: linear-gradient(135deg, #4A90E2, #357ABD);
            color: white; padding: 0.6rem 1.2rem;
            border: none; border-radius: 25px; cursor: pointer;
            font-size: 0.85rem; font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-del { 
            background: linear-gradient(135deg, #E74C3C, #C0392B);
            color: white; padding: 0.6rem 1.2rem;
            border: none; border-radius: 25px; cursor: pointer;
            font-size: 0.85rem; font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-edit:hover, .btn-del:hover { transform: translateY(-2px); scale: 1.05; }

        /* Cart */
        .cart-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(248,244,230,0.9));
            backdrop-filter: blur(20px);
            padding: 2.5rem; border-radius: 25px;
            border: 1px solid rgba(212,175,55,0.2);
            box-shadow: var(--shadow);
        }
        .cart-title {
            font-size: 2rem; font-weight: 700; margin-bottom: 2rem;
            background: linear-gradient(45deg, var(--gold), var(--black));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .cart-items { 
            min-height: 100px; padding: 1.5rem;
            background: rgba(212,175,55,0.05);
            border-radius: 15px; margin-bottom: 2rem;
            border-right: 4px solid var(--gold);
        }
        .total-display {
            font-size: 2.2rem; font-weight: 900; margin: 2rem 0;
            text-align: center; padding: 1.5rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            box-shadow: 0 10px 30px rgba(212,175,55,0.2);
        }
        .checkout-btn {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white; border: none;
            padding: 1.5rem 3rem; width: 100%;
            border-radius: 50px; font-weight: 700; font-size: 1.3rem;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 15px 40px rgba(37,211,102,0.4);
            position: relative; overflow: hidden;
        }
        .checkout-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(37,211,102,0.6);
        }

        /* Loading & Alerts */
        .loading {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            z-index: 999; backdrop-filter: blur(5px);
        }
        .spinner {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 60px; height: 60px;
            border: 4px solid rgba(212,175,55,0.3);
            border-top: 4px solid var(--gold);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: translate(-50%,-50%) rotate(0deg); } 100% { transform: translate(-50%,-50%) rotate(360deg); } }

        .alert {
            padding: 1.2rem 2rem; margin: 1rem 0;
            border-radius: 15px; font-weight: 600; font-size: 1rem;
            animation: slideIn 0.4s ease;
        }
        .alert-success {
            background: linear-gradient(135deg, #D4EDDA, #C3E6CB);
            color: #155724; border: 1px solid #C3E6CB;
        }
        .alert-error {
            background: linear-gradient(135deg, #F8D7DA, #F5C6CB);
            color: #721C24; border: 1px solid #F5C6CB;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Responsive */
        @media (max-width: 768px) {
            .products-grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; }
            .container { padding: 0 1.5rem; margin: 1.5rem auto; }
            .logo { font-size: 1.8rem; }
            .auth-box { margin: 1rem; padding: 2.5rem 2rem; }
        }
        @media (max-width: 480px) {
            .products-grid { grid-template-columns: 1fr; }
            header { padding: 1rem; }
            .header-content { flex-direction: column; gap: 1rem; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
    </div>

    <div id="auth-screen">
        <div id="login-form" class="auth-box">
            <h2 class="auth-title">الحـريري ✨</h2>
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="user-in" placeholder="اسم المستخدم">
            </div>
            <div class="input-group">
