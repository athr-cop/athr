<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحريري ✨ | متجر كوبات فاخرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37; --gold-dark: #B8942F; --black: #1A1A1A;
            --cream: #F8F4E6; --white: #FFFFFF; --shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--cream); min-height: 100vh; }
        
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 50%, #fdfcf7 0%, #ede4d4 100%); }
        .loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; backdrop-filter: blur(5px); }
        .spinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 60px; height: 60px; border: 4px solid var(--gold); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: white; padding: 2.5rem; border-radius: 25px; width: 100%; max-width: 400px; box-shadow: var(--shadow); text-align: center; border: 1px solid #eee; }
        .auth-title { font-size: 2.2rem; margin-bottom: 1.5rem; color: var(--black); font-weight: 900; }
        .input-group { position: relative; margin-bottom: 1.2rem; }
        .input-group input { width: 100%; padding: 0.9rem 2.8rem 0.9rem 1rem; border: 2px solid #eee; border-radius: 12px; outline: none; transition: 0.3s; font-family: 'Cairo'; }
        .input-group input:focus { border-color: var(--gold); }
        .input-icon { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--gold); }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: white; border: none; padding: 1rem; width: 100%; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 1.1rem; transition: 0.3s; }
        .toggle-link { margin-top: 1rem; color: #666; cursor: pointer; font-size: 0.9rem; }

        header { background: var(--black); color: white; padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; margin-bottom: 3rem; }
        .product-card { background: white; border-radius: 20px; padding: 1.5rem; text-align: center; box-shadow: var(--shadow); transition: 0.3s; border: 1px solid #f0f0f0; }
        .product-card:hover { transform: translateY(-10px); }
        .product-img { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; margin-bottom: 1rem; }
        
        .cart-box, .admin-panel { background: white; padding: 2rem; border-radius: 20px; box-shadow: var(--shadow); margin-top: 2rem; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .remove-btn { color: #ff4d4d; cursor: pointer; background: none; border: none; font-size: 1.1rem; transition: 0.2s; }
        .remove-btn:hover { transform: scale(1.2); }
        
        .checkout-btn { background: #25D366; color: white; border: none; padding: 1.2rem; width: 100%; border-radius: 50px; font-size: 1.2rem; font-weight: 700; cursor: pointer; }
        .alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 1rem 2rem; border-radius: 10px; z-index: 1000; animation: slideDown 0.5s; box-shadow: var(--shadow); }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; } }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div id="loading" class="loading"><div class="spinner"></div></div>

    <div id="auth-screen">
        <div id="login-form" class="auth-box">
            <h2 class="auth-title">الحـريري ✨</h2>
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="user-in" placeholder="اسم المستخدم">
            </div>
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="pass-in" placeholder="كلمة المرور">
            </div>
            <button class="btn-gold" onclick="login()"><i class="fas fa-sign-in-alt"></i> دخول</button>
            <div class="toggle-link" onclick="toggleAuth(true)">ليس لديك حساب؟ إنشاء حساب</div>
        </div>

        <div id="reg-form" class="auth-box" style="display:none;">
            <h2 class="auth-title">حساب جديد ✨</h2>
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="user-reg" placeholder="اسم المستخدم">
            </div>
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="pass-reg" placeholder="كلمة المرور">
            </div>
            <div class="input-group">
                <i class="fas fa-phone input-icon"></i>
                <input type="tel" id="phone-reg" placeholder="رقم الجوال 05XXXXXXXX">
            </div>
            <button class="btn-gold" onclick="register()">إنشاء الحساب</button>
            <div class="toggle-link" onclick="toggleAuth(false)">لديك حساب؟ سجل دخولك</div>
        </div>
    </div>

    <div id="main-store" style="display:none;">
        <header>
            <div class="header-content">
                <h1>الحريري ✨</h1>
                <div id="status-tag" style="background: var(--gold); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color:black; font-weight:bold;"></div>
                <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div class="container">
            <div id="admin-panel" class="admin-panel" style="display:none; margin-bottom: 2rem; border: 2px dashed var(--gold);">
                <h3 style="margin-bottom:1rem; color:var(--gold-dark)"><i class="fas fa-tools"></i> لوحة التحكم (أدمن)</h3>
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:10px;">
                    <input type="text" id="p-name" placeholder="اسم الكوب" style="padding:10px; border-radius:8px; border:1px solid #ddd;">
                    <input type="number" id="p-price" placeholder="السعر" style="padding:10px; border-radius:8px; border:1px solid #ddd;">
                    <input type="text" id="p-img" placeholder="رابط الصورة" style="padding:10px; border-radius:8px; border:1px solid #ddd;">
                    <button class="btn-gold" onclick="addProduct()">إضافة للمتجر</button>
                </div>
            </div>

            <div id="products-list" class="products-grid"></div>

            <div class="cart-box">
                <h3 style="border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom:1rem;"><i class="fas fa-shopping-basket"></i> حقيبة التسوق</h3>
                <div id="cart-items">الحقيبة فارغة...</div>
                <div style="font-size: 1.8rem; font-weight: 900; text-align: center; margin: 1.5rem 0;">الإجمالي: <span id="total-price" style="color:var(--gold-dark)">0</span> ر.س</div>
                <button class="checkout-btn" onclick="sendWhatsApp()"><i class="fab fa-whatsapp"></i> إرسال الطلب عبر واتساب</button>
            </div>
        </div>
    </div>

    <script>
        const MY_NUMBER = "971547951518";
        let isAdmin = false;
        let currentUser = "";
        let currentPhone = "";
        let cart = [];
        let prods = JSON.parse(localStorage.getItem('hariri_prods')) || [
            { id: 1, name: "كوب حريري ذهبي", price: 65, img: "https://images.unsplash.com/photo-1570784332177-fdd73efa821f?w=300&h=300&fit=crop" },
            { id: 2, name: "كوب حريري كلاسيك", price: 55, img: "https://images.unsplash.com/photo-1611593731754-f3d5f5406a94?w=300&h=300&fit=crop" }
        ];

        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = ((hash << 5) - hash + str.charCodeAt(i)) & 0xFFFFFFFF;
            return hash.toString(16);
        }

        function toggleAuth(showReg) {
            document.getElementById('login-form').style.display = showReg ? 'none' : 'block';
            document.getElementById('reg-form').style.display = showReg ? 'block' : 'none';
        }

        function register() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value;
            const ph = document.getElementById('phone-reg').value.replace(/\D/g, '');
            if(!u || !p || !ph) return showAlert("❌ يرجى تعبئة كافة الحقول", "error");
            let users = JSON.parse(localStorage.getItem('hariri_users')) || [];
            if(users.find(x => x.u === u)) return showAlert("❌ هذا الاسم مسجل مسبقاً", "error");
            users.push({u, p: simpleHash(p), ph});
            localStorage.setItem('hariri_users', JSON.stringify(users));
            showAlert("✅ تم إنشاء الحساب بنجاح!", "success");
            toggleAuth(false);
        }

        function login() {
            const u = document.getElementById('user-in').value.trim();
            const p = simpleHash(document.getElementById('pass-in').value);
            showLoading(true);
            setTimeout(() => {
                if(u === "admin" && p === simpleHash("123")) {
                    isAdmin = true; currentUser = "المدير";
                    document.getElementById('admin-panel').style.display = 'block';
                } else {
                    let users = JSON.parse(localStorage.getItem('hariri_users')) || [];
                    let found = users.find(x => x.u === u && x.p === p);
                    if(!found) { showLoading(false); return showAlert("❌ اسم المستخدم أو كلمة السر خطأ", "error"); }
                    currentUser = found.u; currentPhone = found.ph;
                }
                document.getElementById('status-tag').innerText = `مرحباً: ${currentUser}`;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-store').style.display = 'block';
                render();
                showLoading(false);
            }, 800);
        }

        function render() {
            const list = document.getElementById('products-list');
            list.innerHTML = prods.map(p => `
                <div class="product-card">
                    <img src="${p.img}" class="product-img">
                    <h3>${p.name}</h3>
                    <div style="font-size:1.4rem; color:var(--gold-dark); font-weight:900; margin:10px 0;">${p.price} ر.س</div>
                    <button class="btn-gold" onclick="addToCart(${p.id})">أضف للحقيبة</button>
                    ${isAdmin ? `<button onclick="deleteProd(${p.id})" style="margin-top:8px; background:#ff4d4d; color:white; border:none; padding:8px; border-radius:8px; width:100%; cursor:pointer;">حذف من المتجر</button>` : ''}
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = prods.find(p => p.id === id);
            cart.push({...item, cartId: Date.now() + Math.random()}); // معرف فريد للسلة
            updateCart();
            showAlert(`✅ تمت إضافة ${item.name} للحقيبة`, "success");
        }

        function removeFromCart(cartId) {
            cart = cart.filter(item => item.cartId !== cartId);
            updateCart();
        }

        function updateCart() {
            const container = document.getElementById('cart-items');
            if(cart.length === 0) { 
                container.innerHTML = "الحقيبة فارغة..."; 
                document.getElementById('total-price').innerText = "0";
                return; 
            }
            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div>
                        <strong>${item.name}</strong><br>
                        <small>${item.price} ر.س</small>
                    </div>
                    <button class="remove-btn" onclick="removeFromCart(${item.cartId})">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
            document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.price, 0);
        }

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = Number(document.getElementById('p-price').value);
            const img = document.getElementById('p-img').value || "https://via.placeholder.com/300";
            if(!name || !price) return showAlert("⚠️ أدخل الاسم والسعر", "error");
            prods.push({id: Date.now(), name, price, img});
            localStorage.setItem('hariri_prods', JSON.stringify(prods));
            render();
            showAlert("✅ تمت إضافة المنتج للمتجر", "success");
        }

        function deleteProd(id) {
            if(!confirm("هل تريد حذف هذا المنتج نهائياً من المتجر؟")) return;
            prods = prods.filter(p => p.id !== id);
            localStorage.setItem('hariri_prods', JSON.stringify(prods));
            render();
        }

        function sendWhatsApp() {
            if(cart.length === 0) return showAlert("⚠️ الحقيبة فارغة حالياً", "error");
            let text = `طلب جديد من متجر الحريري ✨%0Aالعميل: ${currentUser}%0Aالجوال: ${currentPhone}%0A%0A`;
            cart.forEach((i, idx) => text += `${idx+1}. ${i.name} - ${i.price} AED%AED`);
            text += `%AED*الإجمالي النهائي: ${document.getElementById('total-price').innerText} AED*`;
            window.open(`https://wa.me/${MY_NUMBER}?text=${text}`, '_blank');
        }

        function showAlert(msg, type) {
            const a = document.createElement('div');
            a.className = `alert alert-${type}`;
            a.innerText = msg;
            document.body.appendChild(a);
            setTimeout(() => a.remove(), 3000);
        }

        function showLoading(s) { document.getElementById('loading').style.display = s ? 'block' : 'none'; }
    </script>
</body>
</html>
